<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">Synthetic cross-paper synthesis report preview</title>
  <desc id="desc">A visual preview of a report that keeps evidence, interpretation, and prohibited conclusions separate.</desc>
  <defs>
    <linearGradient id="top" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#10213D"/>
      <stop offset="1" stop-color="#164758"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0B1630" flood-opacity=".18"/>
    </filter>
    <style>
      .title { font: 700 38px Inter, "Segoe UI", sans-serif; fill: #FFFFFF; }
      .sub { font: 400 18px Inter, "Segoe UI", sans-serif; fill: #C8D8EA; }
      .h { font: 700 22px Inter, "Segoe UI", sans-serif; fill: #183052; }
      .body { font: 400 17px Inter, "Segoe UI", sans-serif; fill: #394C67; }
      .cardTitle { font: 700 18px Inter, "Segoe UI", sans-serif; fill: #183052; }
      .metric { font: 750 31px Inter, "Segoe UI", sans-serif; fill: #0B8E7A; }
      .small { font: 500 15px Inter, "Segoe UI", sans-serif; fill: #60738E; }
      .warn { font: 650 16px Inter, "Segoe UI", sans-serif; fill: #8A4D00; }
    </style>
  </defs>
  <rect width="1400" height="820" fill="#EEF3F8"/>
  <rect width="1400" height="155" fill="url(#top)"/>
  <text x="76" y="72" class="title">Synthetic Cross-Paper Synthesis</text>
  <text x="76" y="108" class="sub">Three research traditions · eight page-verified claims · zero unsupported conclusions</text>

  <g filter="url(#shadow)">
    <rect x="75" y="190" width="270" height="130" rx="20" fill="#FFFFFF"/>
    <text x="105" y="228" class="cardTitle">Sources</text>
    <text x="105" y="275" class="metric">3</text>
    <text x="160" y="275" class="small">synthetic PDFs</text>
    <rect x="365" y="190" width="270" height="130" rx="20" fill="#FFFFFF"/>
    <text x="395" y="228" class="cardTitle">Study units</text>
    <text x="395" y="275" class="metric">3</text>
    <text x="450" y="275" class="small">designs separated</text>
    <rect x="655" y="190" width="270" height="130" rx="20" fill="#FFFFFF"/>
    <text x="685" y="228" class="cardTitle">Verified claims</text>
    <text x="685" y="275" class="metric">8</text>
    <text x="740" y="275" class="small">page + locator</text>
    <rect x="945" y="190" width="380" height="130" rx="20" fill="#FFFFFF"/>
    <text x="975" y="228" class="cardTitle">Validation status</text>
    <text x="975" y="275" class="metric">0 errors</text>
    <text x="1110" y="275" class="small">release gate passed</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="75" y="355" width="610" height="295" rx="22" fill="#FFFFFF"/>
    <text x="105" y="397" class="h">Verified findings</text>
    <circle cx="113" cy="438" r="7" fill="#426FE3"/>
    <text x="135" y="444" class="body">Experiment: recall means and ANOVA traced to S0001 p.2</text>
    <circle cx="113" cy="486" r="7" fill="#30B8C8"/>
    <text x="135" y="492" class="body">Qualitative: audit-trail theme traced to S0002 p.2</text>
    <circle cx="113" cy="534" r="7" fill="#31C69F"/>
    <text x="135" y="540" class="body">Benchmark: domain-shift metrics traced to S0003 p.2</text>
    <rect x="105" y="575" width="550" height="48" rx="12" fill="#E9F8F4"/>
    <text x="125" y="606" class="body">Each finding retains its design, context, and appraisal boundary.</text>

    <rect x="715" y="355" width="610" height="295" rx="22" fill="#FFFFFF"/>
    <text x="745" y="397" class="h">Interpretation boundary</text>
    <text x="745" y="444" class="body">The studies cannot be statistically pooled.</text>
    <text x="745" y="481" class="body">Their shared lesson is methodological:</text>
    <text x="745" y="518" class="body">preserve evidence location, design, and uncertainty.</text>
    <rect x="745" y="558" width="550" height="65" rx="12" fill="#FFF1D6"/>
    <text x="765" y="584" class="warn">PROHIBITED CONCLUSION</text>
    <text x="765" y="608" class="small">Synthetic documents are not evidence about real effects.</text>
  </g>

  <rect x="75" y="690" width="1250" height="74" rx="18" fill="#10213D"/>
  <text x="105" y="735" class="sub">Evidence ≠ inference · Statistical significance ≠ practical importance · Benchmark score ≠ deployment validity</text>
</svg>
