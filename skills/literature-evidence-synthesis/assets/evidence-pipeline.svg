<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Universal literature evidence synthesis pipeline</title>
  <desc id="desc">A domain-agnostic workflow from mixed research papers to verified claims, design-aware appraisal, and cross-paper synthesis.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1630"/>
      <stop offset="0.55" stop-color="#142A4C"/>
      <stop offset="1" stop-color="#103D4A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7C6CF6"/>
      <stop offset="1" stop-color="#24C7B1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="13" flood-color="#020617" flood-opacity=".35"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7FE4D5"/>
    </marker>
    <style>
      .title { font: 700 48px Inter, "Segoe UI", sans-serif; fill: #F8FAFC; letter-spacing: -.5px; }
      .subtitle { font: 400 23px Inter, "Segoe UI", "Microsoft YaHei", sans-serif; fill: #B9C8DE; }
      .cardTitle { font: 700 24px Inter, "Segoe UI", sans-serif; fill: #F8FAFC; }
      .cardText { font: 400 17px Inter, "Segoe UI", sans-serif; fill: #C8D5E8; }
      .step { font: 700 15px Inter, "Segoe UI", sans-serif; fill: #071521; }
      .chip { font: 600 16px Inter, "Segoe UI", sans-serif; fill: #DCE7F7; }
      .footerTitle { font: 700 20px Inter, "Segoe UI", sans-serif; fill: #F8FAFC; }
      .footerText { font: 400 17px Inter, "Segoe UI", "Microsoft YaHei", sans-serif; fill: #C6D5E8; }
    </style>
  </defs>

  <rect width="1600" height="900" rx="34" fill="url(#bg)"/>
  <circle cx="1415" cy="105" r="185" fill="#705CF6" opacity=".10"/>
  <circle cx="120" cy="790" r="220" fill="#24C7B1" opacity=".08"/>

  <text x="90" y="86" class="title">Literature Evidence Synthesis</text>
  <text x="90" y="125" class="subtitle">通用、逐页核验、设计感知的跨论文证据综合机制</text>
  <rect x="90" y="151" width="1420" height="5" rx="2.5" fill="url(#accent)"/>

  <!-- arrows -->
  <g stroke="#7FE4D5" stroke-width="4" fill="none" marker-end="url(#arrow)" opacity=".9">
    <path d="M 355 342 H 415"/>
    <path d="M 660 342 H 720"/>
    <path d="M 965 342 H 1025"/>
    <path d="M 1270 342 H 1330"/>
  </g>

  <!-- card 1 -->
  <g filter="url(#shadow)">
    <rect x="80" y="205" width="275" height="275" rx="25" fill="#172847" stroke="#385378"/>
    <circle cx="120" cy="247" r="19" fill="#8B7CF8"/>
    <text x="120" y="252" text-anchor="middle" class="step">01</text>
    <text x="150" y="255" class="cardTitle">Mixed corpus</text>
    <text x="110" y="308" class="cardText">PDFs from any field</text>
    <text x="110" y="340" class="cardText">Bibliographic identity</text>
    <text x="110" y="372" class="cardText">Page text + SHA-256</text>
    <text x="110" y="404" class="cardText">OCR and access status</text>
    <rect x="110" y="431" width="215" height="5" rx="2.5" fill="#8B7CF8"/>
  </g>

  <!-- card 2 -->
  <g filter="url(#shadow)">
    <rect x="415" y="205" width="245" height="275" rx="25" fill="#172E4D" stroke="#376182"/>
    <circle cx="455" cy="247" r="19" fill="#6E92F5"/>
    <text x="455" y="252" text-anchor="middle" class="step">02</text>
    <text x="485" y="255" class="cardTitle">Four layers</text>
    <text x="445" y="308" class="cardText">Sources</text>
    <text x="445" y="340" class="cardText">Study / analysis units</text>
    <text x="445" y="372" class="cardText">Claims</text>
    <text x="445" y="404" class="cardText">Appraisals</text>
    <rect x="445" y="431" width="185" height="5" rx="2.5" fill="#6E92F5"/>
  </g>

  <!-- card 3 -->
  <g filter="url(#shadow)">
    <rect x="720" y="205" width="245" height="275" rx="25" fill="#15364F" stroke="#32708A"/>
    <circle cx="760" cy="247" r="19" fill="#38BBD1"/>
    <text x="760" y="252" text-anchor="middle" class="step">03</text>
    <text x="790" y="255" class="cardTitle">Verify claims</text>
    <text x="750" y="308" class="cardText">Exact PDF page</text>
    <text x="750" y="340" class="cardText">Original value + unit</text>
    <text x="750" y="372" class="cardText">Section / table / figure</text>
    <text x="750" y="404" class="cardText">Relocation phrase</text>
    <rect x="750" y="431" width="185" height="5" rx="2.5" fill="#38BBD1"/>
  </g>

  <!-- card 4 -->
  <g filter="url(#shadow)">
    <rect x="1025" y="205" width="245" height="275" rx="25" fill="#123B4E" stroke="#2B7D83"/>
    <circle cx="1065" cy="247" r="19" fill="#34D3B5"/>
    <text x="1065" y="252" text-anchor="middle" class="step">04</text>
    <text x="1095" y="255" class="cardTitle">Appraise</text>
    <text x="1055" y="308" class="cardText">Design-specific domains</text>
    <text x="1055" y="340" class="cardText">Bias + validity</text>
    <text x="1055" y="372" class="cardText">Supporting reasons</text>
    <text x="1055" y="404" class="cardText">No universal score</text>
    <rect x="1055" y="431" width="185" height="5" rx="2.5" fill="#34D3B5"/>
  </g>

  <!-- card 5 -->
  <g filter="url(#shadow)">
    <rect x="1330" y="205" width="190" height="275" rx="25" fill="#104449" stroke="#2A8B7C"/>
    <circle cx="1370" cy="247" r="19" fill="#78E2A8"/>
    <text x="1370" y="252" text-anchor="middle" class="step">05</text>
    <text x="1400" y="255" class="cardTitle">Synthesize</text>
    <text x="1360" y="308" class="cardText">Consistency</text>
    <text x="1360" y="340" class="cardText">Directness</text>
    <text x="1360" y="372" class="cardText">Uncertainty</text>
    <text x="1360" y="404" class="cardText">Audit appendix</text>
    <rect x="1360" y="431" width="130" height="5" rx="2.5" fill="#78E2A8"/>
  </g>

  <!-- design adapters -->
  <text x="90" y="545" class="footerTitle">DESIGN ADAPTERS</text>
  <text x="90" y="576" class="footerText">One core provenance model, with only the checks appropriate to each research tradition.</text>
  <g>
    <rect x="90" y="610" width="190" height="52" rx="26" fill="#263A61" stroke="#6E92F5"/>
    <text x="185" y="642" text-anchor="middle" class="chip">Experimental</text>
    <rect x="300" y="610" width="190" height="52" rx="26" fill="#253D61" stroke="#6E92F5"/>
    <text x="395" y="642" text-anchor="middle" class="chip">Observational</text>
    <rect x="510" y="610" width="150" height="52" rx="26" fill="#23445F" stroke="#38BBD1"/>
    <text x="585" y="642" text-anchor="middle" class="chip">Clinical</text>
    <rect x="680" y="610" width="160" height="52" rx="26" fill="#20495C" stroke="#38BBD1"/>
    <text x="760" y="642" text-anchor="middle" class="chip">Qualitative</text>
    <rect x="860" y="610" width="195" height="52" rx="26" fill="#1D4E57" stroke="#34D3B5"/>
    <text x="957" y="642" text-anchor="middle" class="chip">Computational</text>
    <rect x="1075" y="610" width="175" height="52" rx="26" fill="#1A514F" stroke="#34D3B5"/>
    <text x="1162" y="642" text-anchor="middle" class="chip">Reviews</text>
    <rect x="1270" y="610" width="240" height="52" rx="26" fill="#185546" stroke="#78E2A8"/>
    <text x="1390" y="642" text-anchor="middle" class="chip">Theory · Policy</text>
  </g>

  <!-- invariant -->
  <g filter="url(#shadow)">
    <rect x="90" y="716" width="1420" height="108" rx="26" fill="#0C1A2E" stroke="#40617C"/>
    <rect x="90" y="716" width="12" height="108" rx="6" fill="url(#accent)"/>
    <text x="130" y="759" class="footerTitle">CORE INVARIANT</text>
    <text x="130" y="793" class="footerText">No substantive conclusion enters synthesis without a readable source, valid PDF page, and relocation phrase.</text>
    <text x="1465" y="777" text-anchor="end" class="subtitle">Candidate ≠ Evidence</text>
  </g>
</svg>
